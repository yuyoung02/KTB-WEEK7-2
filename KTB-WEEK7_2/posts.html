<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 목록</title>
  <link rel="stylesheet" href="./css/posts.css" />
</head>
<body>
  <header class="header">
    <a href="./posts.html" class="logo">
      <h1>아무 말 대잔치</h1>
    </a>

    <div class="profile-menu">
      <img
        src="./assets/images/defaultProfileImage.png"
        class="header-profile-image"
        id="profileButton"
        alt="프로필"
      />

      <ul class="dropdown hidden">
        <li><a href="./userEdit.html">회원정보수정</a></li>
        <li><a href="./passwordEdit.html">비밀번호수정</a></li>
        <li><a href="./login.html" id="logoutButton">로그아웃</a></li>
      </ul>
    </div>
  </header>

  <main class="posts-page">
    <section class="posts-container">
      <p class="welcome-text">
        안녕하세요,<br />
        아무 말 대잔치 게시판 입니다.
      </p>

      <div class="write-button-wrap">
        <a href="./write.html" class="write-button">게시글 작성</a>
      </div>

      <section class="post-list"></section>
    </section>
  </main>

  <script src="./js/posts.js"></script>

</html>
