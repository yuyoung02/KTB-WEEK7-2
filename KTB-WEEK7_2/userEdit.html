<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지</title>
  <link rel="stylesheet" href="./css/userEdit.css" />
</head>
<body>
  <header class="header">
    <a href="./posts.html" class="logo">
    <h1>⚾️ 야구 = 질병 ⚾️</h1>
</a>

    <div class="profile-menu">
      <img
        src="./assets/images/defaultProfileImage.png"
        alt="프로필 이미지"
        class="header-profile-image"
        id="profileButton"
      />

      <ul class="dropdown hidden">
        <li><a href="./userEdit.html">회원정보수정</a></li>
        <li><a href="./passwordEdit.html">비밀번호수정</a></li>
        <li><a href="./login.html" id="logoutButton">로그아웃</a></li>
      </ul>
    </div>
  </header>

  <main class="user-edit-page">
    <section class="user-edit-container">
      <h2>마이페이지</h2>

      <section class="season-summary">
        <p class="summary-label">2026 시즌 승부예측</p>
        <div class="summary-grid">
          <div>
            <strong id="seasonPoint">0P</strong>
            <span>시즌 포인트</span>
          </div>
          <div>
            <strong id="predictionCount">0</strong>
            <span>예측 경기</span>
          </div>
          <div>
            <strong id="correctCount">0</strong>
            <span>적중 경기</span>
          </div>
          <div>
            <strong id="accuracyRate">0%</strong>
            <span>적중률</span>
          </div>
        </div>
      </section>

      <h3 class="edit-section-title">회원정보 수정</h3>

      <form class="user-edit-form">
        <div class="profile-edit-area">
          <label>프로필 사진*</label>

          <input id="profileImage" type="file" accept="image/*" hidden />

          <label for="profileImage" class="profile-image-box">
            <img src="./assets/images/defaultProfileImage.png" alt="프로필 사진" />
            <span>변경</span>
          </label>
        </div>

        <div class="form-box">
          <label>이메일</label>
          <p class="email-text"></p>

          <label for="nickname">닉네임</label>
          <input id="nickname" type="text" maxlength="10" />

          <p class="helper-text">* helper text</p>

          <button type="submit" class="submit-button">수정하기</button>
        </div>
      </form>

      <button type="button" class="withdraw-button">회원 탈퇴</button>

      <div class="toast">수정완료</div>
    </section>
  </main>

  <div class="modal-overlay hidden" id="withdrawModal">
    <div class="modal">
      <h3>회원탈퇴 하시겠습니까?</h3>
      <p>
      작성된 게시글과 댓글은 삭제되며,<br>
      회원정보는 탈퇴일로부터 1개월 후 완전히 삭제됩니다.
    </p>

      <div class="modal-button-row">
        <button type="button" class="cancel-button">취소</button>
        <button type="button" class="confirm-button">확인</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="passwordConfirmModal">
  <div class="modal">
    <h3>비밀번호 확인</h3>
    <p>회원탈퇴를 위해 비밀번호를 입력해주세요.</p>

    <input
      type="password"
      id="withdrawPassword"
      placeholder="비밀번호"
    />

    <p class="withdraw-helper-text"></p>

    <div class="modal-button-row">
      <button type="button" class="cancel-button" id="passwordCancelButton">취소</button>
      <button type="button" class="confirm-button" id="passwordConfirmButton">확인</button>
    </div>
  </div>
</div>

  <script src="./js/userEdit.js"></script>
</body>
</html>
