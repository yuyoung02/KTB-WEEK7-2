<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <link rel="stylesheet" href="./css/signup.css" />
</head>
<body>
  <header class="header">
    <a href="./login.html" class="back-button">‹</a>
    <a href="./home.html" class="logo">
      <h1>⚾️ 야구 = 질병 ⚾️</h1>
    </a>
  </header>

  <main class="signup-page">
    <section class="signup-container">
      <h2>회원가입</h2>

      <form class="signup-form">
        <div class="profile-area">
          <label for="profile">프로필 사진</label>
          <p class="helper-text" id="profileHelper"></p>

          <input id="profile" type="file" accept="image/*" hidden />

          <label for="profile" class="profile-upload">
            <span>+</span>
          </label>
        </div>

        <div class="input-box">
          <label for="email">이메일*</label>
          <input id="email" type="email" placeholder="이메일을 입력하세요" />
          <p class="helper-text" id="emailHelper"></p>
        </div>

        <div class="input-box">
          <label for="password">비밀번호*</label>
          <input id="password" type="password" placeholder="비밀번호를 입력하세요" />
          <p class="helper-text" id="passwordHelper"></p>
        </div>

        <div class="input-box">
          <label for="password-check">비밀번호 확인*</label>
          <input id="password-check" type="password" placeholder="비밀번호를 한번 더 입력하세요" />
          <p class="helper-text" id="passwordCheckHelper"></p>
        </div>

        <div class="input-box">
          <label for="nickname">닉네임*</label>
          <input id="nickname" type="text" placeholder="닉네임을 입력하세요" />
          <p class="helper-text" id="nicknameHelper"></p>
        </div>

        <button type="submit" class="signup-button">회원가입</button>
      </form>

      <a href="./login.html" class="login-link">로그인하러 가기</a>
    </section>
  </main>

  <div class="modal-overlay hidden" id="signupSuccessModal">
  <div class="modal">
    <h3>회원가입 완료되었습니다.</h3>
    <p>로그인 페이지로 이동합니다.</p>

    <button type="button" class="modal-confirm-button" id="signupSuccessConfirm">
      확인
    </button>
  </div>
</div>

  <script src="./js/common.js"></script>
  <script src="./js/signup.js"></script>
</body>
</html>
