<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 작성</title>
  <link rel="stylesheet" href="./css/write.css" />
</head>
<body>
  <header class="header">
    <a href="./posts.html" class="back-button">‹</a>

    <a href="./posts.html" class="logo">
      <h1>⚾️ 야구 = 질병 ⚾️</h1>
    </a>

  <div class="profile-menu">
    <img
      src="./assets/images/defaultProfileImage.png"
      alt="프로필 이미지"
      class="header-profile-image"
      id="profileButton"
    />

    <ul class="dropdown hidden">
      <li><a href="./userEdit.html">회원정보수정</a></li>
      <li><a href="./passwordEdit.html">비밀번호수정</a></li>
      <li><a href="./login.html">로그아웃</a></li>
    </ul>
</div>
  </header>

  <main class="write-page">
    <section class="write-container">
      <h2>게시글 작성</h2>

      <form class="write-form">
        <div class="input-box">
  <label>구장*</label>

  <div class="stadium-select">
    <button
      type="button"
      class="stadium-select-button"
      id="stadiumButton"
    >
      <span id="selectedStadium">
        구장을 선택해주세요.
      </span>

      <span class="chevron"></span>
    </button>

    <ul
      class="stadium-dropdown hidden"
      id="stadiumDropdown"
    >
      <li class="stadium-option" data-value="JAMSIL">
        <span class="option-logo-wrap double">
          <img
            src="./assets/images/teams/lg.svg"
            alt="LG 트윈스"
            class="team-logo"
          />
          <img
            src="./assets/images/teams/doosan.svg"
            alt="두산 베어스"
            class="team-logo"
          />
        </span>
        <span class="option-name">잠실야구장</span>
      </li>

      <li class="stadium-option" data-value="DAEJEON">
        <span class="option-logo-wrap">
          <img
            src="./assets/images/teams/hanwha.svg"
            alt="한화 이글스"
            class="team-logo"
          />
        </span>
        <span class="option-name">대전 한화생명 볼파크</span>
      </li>

      <li class="stadium-option" data-value="GOCHEOK">
        <span class="option-logo-wrap">
          <img
            src="./assets/images/teams/kiwoom.svg"
            alt="키움 히어로즈"
            class="team-logo"
          />
        </span>
        <span class="option-name">고척스카이돔</span>
      </li>

      <li class="stadium-option" data-value="SUWON">
        <span class="option-logo-wrap">
          <img
            src="./assets/images/teams/kt.svg"
            alt="KT 위즈"
            class="team-logo"
          />
        </span>
        <span class="option-name">수원 KT위즈파크</span>
      </li>

      <li class="stadium-option" data-value="INCHEON">
        <span class="option-logo-wrap">
          <img
            src="./assets/images/teams/ssg.svg"
            alt="SSG 랜더스"
            class="team-logo"
          />
        </span>
        <span class="option-name">인천 SSG랜더스필드</span>
      </li>

      <li class="stadium-option" data-value="DAEGU">
        <span class="option-logo-wrap">
          <img
            src="./assets/images/teams/samsung.svg"
            alt="삼성 라이온즈"
            class="team-logo"
          />
        </span>
        <span class="option-name">대구 삼성라이온즈파크</span>
      </li>

      <li class="stadium-option" data-value="GWANGJU">
        <span class="option-logo-wrap">
          <img
            src="./assets/images/teams/kia.svg"
            alt="KIA 타이거즈"
            class="team-logo"
          />
        </span>
        <span class="option-name">광주 챔피언스필드</span>
      </li>

      <li class="stadium-option" data-value="BUSAN">
        <span class="option-logo-wrap">
          <img
            src="./assets/images/teams/lotte.svg"
            alt="롯데 자이언츠"
            class="team-logo"
          />
        </span>
        <span class="option-name">부산 사직야구장</span>
      </li>

      <li class="stadium-option" data-value="CHANGWON">
        <span class="option-logo-wrap">
          <img
            src="./assets/images/teams/nc.svg"
            alt="NC 다이노스"
            class="team-logo"
          />
        </span>
        <span class="option-name">창원 NC파크</span>
      </li>
    </ul>
  </div>
</div>

        <div class="input-box">
          <label for="title">제목*</label>
          <input
            id="title"
            type="text"
            placeholder="제목을 입력해주세요. (최대 26글자)"
            maxlength="26"
          />
        </div>

        <div class="input-box">
          <label for="content">내용*</label>
          <textarea
            id="content"
            placeholder="내용을 입력해주세요."
          ></textarea>
          <p class="helper-text">* helper text</p>
        </div>

        <div class="file-box">
          <label>이미지</label>

          <div class="file-row">
            <label for="image" class="file-button">파일 선택</label>
            <span class="file-name">파일을 선택해주세요.</span>
            <input id="image" type="file" accept="image/*" hidden />
          </div>
        </div>

        <button type="submit" class="submit-button">완료</button>
      </form>
    </section>
  </main>
  <script src="./js/common.js"></script>
  <script src="./js/write.js"></script>
</body>
</html>
