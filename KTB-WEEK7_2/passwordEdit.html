<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정</title>
  <link rel="stylesheet" href="./css/passwordEdit.css" />
</head>
<body>
  <header class="header">
    <a href="./posts.html" class="logo">
    <h1>⚾️ 야구 = 질병 ⚾️</h1>
</a>

    <div class="profile-menu">
  <img
    src="./assets/images/defaultProfileImage.png"
    alt="프로필 이미지"
    class="header-profile-image"
    id="profileButton"
  />

  <ul class="dropdown hidden">
    <li><a href="./userEdit.html">회원정보수정</a></li>
    <li><a href="./passwordEdit.html">비밀번호수정</a></li>
    <li><a href="./login.html">로그아웃</a></li>
  </ul>
</div>
  </header>

  <main class="password-page">
    <section class="password-container">
      <h2>비밀번호 수정</h2>

      <form class="password-form">
        <div class="input-box">
  <label for="current-password">기존 비밀번호</label>
  <input
    id="current-password"
    type="password"
    placeholder="기존 비밀번호를 입력하세요"
  />
  <p class="helper-text"></p>
</div>

  <div class="input-box">
    <label for="new-password">새 비밀번호</label>
    <input
      id="new-password"
      type="password"
      placeholder="새 비밀번호를 입력하세요"
    />
    <p class="helper-text"></p>
  </div>

  <div class="input-box">
    <label for="new-password-check">새 비밀번호 확인</label>
    <input
      id="new-password-check"
      type="password"
      placeholder="새 비밀번호를 한번 더 입력하세요"
    />
    <p class="helper-text"></p>
  </div>

        <button type="submit" class="submit-button">수정하기</button>
      </form>
      <div class="toast">
    변경 완료
  </div>
    </section>
  </main>

  <script src="./js/passwordEdit.js"></script>
</body>
</html>
